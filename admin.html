<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理面板</title>
<style>
:root{
  --bg:#f5f7fb;--panel:#fff;--soft:#f9fbfd;--border:#e5e7eb;--line:#eef1f5;
  --ink:#1f2937;--muted:#667085;--blue:#2563eb;--blue-d:#1d4ed8;--green:#0f9f6e;--red:#dc2626;
  --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
/* header */
.hdr{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--border)}
.hdr-in{max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:0 24px;height:60px}
.logo{width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#60a5fa);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(37,99,235,.3)}
h1{font-size:17px;font-weight:700;letter-spacing:-.01em}
.pill{font-size:12px;padding:4px 11px;border-radius:999px;font-weight:600}
.pill-i{background:#eff6ff;color:#2563eb}
.pill-h{background:#f1f5f9;color:#64748b;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp{flex:1}
.saved{font-size:13px;color:var(--green);font-weight:600}
.btn{padding:9px 20px;border-radius:9px;background:var(--blue);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s,transform .05s}
.btn:hover{background:var(--blue-d)}.btn:active{transform:translateY(1px)}.btn:disabled{background:#94a3b8;cursor:not-allowed}
/* layout */
.wrap{max-width:1000px;margin:0 auto;padding:24px;display:flex;flex-direction:column;gap:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 3px rgba(16,24,40,.04);overflow:hidden}
.card-h{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;padding:15px 18px;border-bottom:1px solid var(--line)}
.card-h .ico{font-size:15px}
/* field rows */
.field{display:flex;align-items:center;gap:12px;padding:0 18px;min-height:46px;border-bottom:1px solid var(--line)}
.field:last-child{border-bottom:none}
.field>label{font-size:13px;color:var(--muted);width:88px;flex-shrink:0;font-weight:500}
.field input,.field select{flex:1;border:none;background:none;font-size:14px;color:var(--ink);outline:none;font-family:inherit;text-align:right;min-width:0}
.field input::placeholder{color:#c0c8d4}
.field select{-webkit-appearance:none;appearance:none;padding-right:18px;cursor:pointer;text-align-last:right;background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='14' viewBox='0 0 10 14'><path d='M2 5l3 3 3-3' stroke='%2394a3b8' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>") no-repeat right center}
.field.sub label{color:#94a3b8;font-style:italic}
/* checkboxes */
.checks{display:flex;flex-wrap:wrap;gap:6px 20px;padding:14px 18px}
.ck{display:flex;align-items:center;gap:8px;cursor:pointer}
.ck input{width:16px;height:16px;accent-color:var(--blue);cursor:pointer}
.ck span{font-size:13px;color:#475569}
/* connection test */
.tf{display:flex;align-items:center;gap:8px;padding:12px 18px;border-top:1px solid var(--line)}
.tf>label{font-size:13px;color:var(--muted);flex-shrink:0}
.th2{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;outline:none;font-family:inherit;min-width:0}
.tp2{width:64px;border:1px solid var(--border);border-radius:8px;padding:7px;font-size:13px;text-align:center;outline:none;font-family:inherit}
.th2:focus,.tp2:focus{border-color:#93c5fd}
.tb{padding:7px 14px;border-radius:8px;background:#eff6ff;color:var(--blue);border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.tb:hover{background:#dbeafe}
#tr{font-size:13px;padding:0 18px 12px;min-height:16px}
/* IP + API two columns */
.row2{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start}
@media(max-width:760px){.row2{grid-template-columns:1fr}}
.ip-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line)}
.ip-head .t{font-size:14px;font-weight:700}
.badge{font-size:12px;background:#eef2ff;color:#6d28d9;padding:2px 9px;border-radius:999px;font-weight:600}
.ip-ta{width:100%;min-height:300px;border:none;padding:14px 18px;font-family:var(--mono);font-size:13px;color:#4338ca;background:#fff;resize:vertical;outline:none;line-height:2;display:block}
.ip-ta::placeholder{color:#c0c8d4}
/* API panel */
.ap{padding:16px;display:flex;flex-direction:column;gap:10px}
.ap-r{display:flex;gap:7px}
.ap-u{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:13px;outline:none;font-family:inherit;min-width:0}
.ap-p{width:54px;border:1px solid var(--border);border-radius:8px;padding:8px 4px;font-size:13px;text-align:center;outline:none;font-family:inherit;flex-shrink:0}
.ap-u:focus,.ap-p:focus{border-color:#93c5fd}
.ap-b{padding:8px 14px;border-radius:8px;background:var(--blue);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.ap-b:hover{background:var(--blue-d)}.ap-b:disabled{background:#94a3b8}
.ap-res{min-height:90px;max-height:170px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;background:var(--soft);font-size:13px;font-family:var(--mono)}
.ap-ph{display:flex;align-items:center;justify-content:center;min-height:88px;color:#c0c8d4}
.ap-it{padding:7px 12px;border-bottom:1px solid var(--line);color:#4338ca;word-break:break-all}
.ap-it:last-child{border-bottom:none}
.ap-st{font-size:13px;color:var(--muted);text-align:center;min-height:16px}.ap-st.ok{color:var(--green)}.ap-st.er{color:var(--red)}
.ap-saved{display:flex;align-items:center;gap:8px;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:9px;padding:8px 11px;font-size:12px;color:var(--green);font-family:var(--mono);word-break:break-all}
.ap-saved span{flex:1}.ap-clr{border:none;background:none;color:var(--red);font-size:12px;cursor:pointer;flex-shrink:0;font-weight:600}
.ap-acts{display:flex;gap:8px}
.btn-ap{flex:1;padding:9px;border-radius:9px;background:var(--blue);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-ap:hover{background:var(--blue-d)}.btn-ap:disabled{background:#94a3b8}
.btn-ap2{background:#ecfdf5;color:var(--green);border:1px solid #a7f3d0}.btn-ap2:hover{background:#d1fae5}
/* subscription links */
.subs{border:1px solid var(--border);border-radius:12px;overflow:hidden}
.subs-h{font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;padding:11px 14px;background:var(--soft);border-bottom:1px solid var(--line)}
.sub-i{display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;padding:12px 14px;font-size:13px;font-weight:600;color:#334155;background:#fff;border:none;border-bottom:1px solid var(--line);cursor:pointer;font-family:inherit;transition:background .12s}
.sub-i:last-child{border-bottom:none}.sub-i:hover{background:#f8fafc}.sub-i.copied{color:var(--green);background:#ecfdf5}
.sub-i::after{content:'复制';font-size:11px;color:#cbd5e1;font-weight:500}
.sub-i.copied::after{content:'✓'}
</style></head><body>
<div class="hdr"><div class="hdr-in">
  <div class="logo">⚡</div><h1>管理面板</h1>
  <span class="pill pill-i" id="ispTag">…</span>
  <span class="pill pill-h" id="hostTag">…</span>
  <div class="sp"></div>
  <span class="saved" id="savedMsg"></span>
  <button class="btn" id="saveBtn">保存配置</button>
</div></div>
<div class="wrap">
  <div class="grid">
    <div class="card">
      <div class="card-h"><span class="ico">🔑</span>核心配置</div>
      <div class="field"><label>UUID</label><input id="uuid" placeholder="必填"></div>
      <div class="field"><label>域名</label><input id="host" placeholder="your.domain.com"></div>
      <div class="field"><label>反代域名</label><input id="proxyip" placeholder="留空直连"></div>
      <div class="field"><label>ECH SNI</label><input id="echSni" placeholder="可选"></div>
      <div class="field"><label>ECH DNS</label><input id="echDns" placeholder="可选"></div>
      <div class="tf"><label>连接测试</label><input id="th" class="th2" value="cloudflare.com"><span style="color:#cbd5e1">:</span><input id="tp" class="tp2" value="443"><button type="button" class="tb" id="testBtn">测试</button></div>
      <div id="tr"></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="ico">📡</span>订阅设置</div>
      <div class="field"><label>节点名称</label><input id="subName" placeholder="节点名称"></div>
      <div class="field"><label>WS 路径</label><input id="wsPath" placeholder="/ws"></div>
      <div class="field"><label>TLS 指纹</label><select id="fingerprint"><option value="chrome">Chrome</option><option value="firefox">Firefox</option><option value="safari">Safari</option><option value="random">随机</option></select></div>
      <div class="field"><label>生成数量</label><input id="ipCount" type="number" min="1" max="100"></div>
      <div class="field"><label>转换后端</label><select id="apiSel"><option value="">默认 · CM 负载均衡</option></select></div>
      <div class="field sub" id="apiTxtrow" style="display:none"><label>自定义</label><input id="apiTxt" placeholder="https://后端地址"></div>
      <div class="field"><label>规则配置</label><select id="cfgSel"><option value="">默认 · 精简多模式</option></select></div>
      <div class="field sub" id="cfgTxtrow" style="display:none"><label>自定义</label><input id="cfgTxt" placeholder="规则 ini 的 URL"></div>
      <div class="checks">
        <label class="ck"><input type="checkbox" id="enable0rtt"><span>0-RTT</span></label>
        <label class="ck"><input type="checkbox" id="skipCert"><span>跳过证书</span></label>
        <label class="ck"><input type="checkbox" id="randomPort"><span>随机端口</span></label>
        <label class="ck"><input type="checkbox" id="subEmoji"><span>Emoji</span></label>
      </div>
    </div>
  </div>
  <div class="row2">
    <div class="card">
      <div class="ip-head"><span class="t">优选 IP</span><span class="badge" id="ipCountBadge">自动</span></div>
      <textarea class="ip-ta" id="ipList" placeholder="IP:端口#备注，每行一个&#10;留空则自动生成优选 IP"></textarea>
    </div>
    <div style="display:flex;flex-direction:column;gap:18px">
      <div class="card">
        <div class="card-h"><span class="ico">🔍</span>优选 API</div>
        <div class="ap">
          <div class="ap-saved" id="apSaved" style="display:none"></div>
          <div class="ap-r">
            <input id="apUrl" class="ap-u" placeholder="优选 API URL（https://...）">
            <input id="apPort" class="ap-p" value="443">
            <button type="button" class="ap-b" id="apBtn">获取</button>
          </div>
          <div class="ap-res" id="apRes"><div class="ap-ph">输入 URL 后点获取</div></div>
          <div class="ap-st" id="apSt"></div>
          <div class="ap-acts" id="apActs" style="display:none">
            <button type="button" class="btn-ap btn-ap2" id="apAdd">追加结果</button>
            <button type="button" class="btn-ap" id="apApi">追加API（实时）</button>
          </div>
        </div>
      </div>
      <div class="subs">
        <div class="subs-h">订阅链接（点击复制）</div>
        <button type="button" class="sub-i" data-q="">自适应订阅</button>
        <button type="button" class="sub-i" data-q="?base64">Base64 订阅</button>
        <button type="button" class="sub-i" data-q="?target=clash">Clash 订阅</button>
        <button type="button" class="sub-i" data-q="?target=singbox">Sing-box 订阅</button>
        <button type="button" class="sub-i" data-q="?target=plain">节点链接（明文）</button>
      </div>
    </div>
  </div>
</div>
<script>
var _ips=[];
var V=id=>document.getElementById(id);
var val=id=>V(id).value.trim();
var setv=(id,v)=>{V(id).value=v==null?'':v;};
var setck=(id,v)=>{V(id).checked=!!v;};

fetch('/admin/config.json').then(function(r){return r.json()}).then(function(c){
  ['uuid','host','proxyip','echSni','echDns','subName','wsPath','ipCount'].forEach(function(k){setv(k,c[k]);});
  setv('fingerprint',c.fingerprint||'chrome');
  setv('ipList',c.customIPs);
  setv('apiTxt',c.subApi);setv('cfgTxt',c.subConfig);
  ['enable0rtt','skipCert','randomPort','subEmoji'].forEach(function(k){setck(k,c[k]);});
  V('ispTag').textContent=c.ispName||'通用';
  V('hostTag').textContent=c.host||'待配置';
  var n=(c.customIPs||'').split('\n').filter(Boolean).length;
  V('ipCountBadge').textContent=n?n+' 个':'自动';
  if(c.customApiUrl)showSaved(c.customApiUrl);
  loadSublist();
});
function showSaved(url){var s=V('apSaved');s.style.display='flex';s.innerHTML='<span>实时API：'+url+'</span><button type="button" class="ap-clr" id="apClr">清除</button>';V('apClr').onclick=clearApi;}

V('saveBtn').onclick=function(){
  var body={uuid:val('uuid'),host:val('host'),proxyip:val('proxyip'),customIPs:val('ipList'),
    subName:val('subName'),wsPath:val('wsPath'),fingerprint:val('fingerprint'),ipCount:val('ipCount'),
    echSni:val('echSni'),echDns:val('echDns'),subApi:val('apiTxt'),subConfig:val('cfgTxt'),
    enable0rtt:V('enable0rtt').checked,skipCert:V('skipCert').checked,randomPort:V('randomPort').checked,subEmoji:V('subEmoji').checked};
  var b=V('saveBtn');b.disabled=true;b.textContent='保存中…';
  fetch('/admin/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json()}).then(function(j){
    V('savedMsg').textContent=j.ok?'✓ 已保存':'保存失败';
    V('hostTag').textContent=body.host||'待配置';
    setTimeout(function(){V('savedMsg').textContent='';},2500);
  }).catch(function(){V('savedMsg').textContent='保存失败';}).finally(function(){b.disabled=false;b.textContent='保存配置';});
};

V('testBtn').onclick=function(){
  var h=val('th'),p=val('tp'),r=V('tr');r.style.color='#94a3b8';r.textContent='测试中…';
  fetch('/admin/test?host='+encodeURIComponent(h)+'&port='+p).then(function(res){return res.text().then(function(x){r.style.color=res.ok?'#0f9f6e':'#dc2626';r.textContent=(res.ok?'✓ ':'✗ ')+x;});}).catch(function(e){r.style.color='#dc2626';r.textContent='✗ '+e.message;});
};

function ph(el,t){el.innerHTML='';var d=document.createElement('div');d.className='ap-ph';d.textContent=t;el.appendChild(d);}
V('apBtn').onclick=function(){
  var url=val('apUrl'),port=V('apPort').value||'443',btn=V('apBtn'),res=V('apRes'),st=V('apSt'),acts=V('apActs');
  if(!url){st.className='ap-st er';st.textContent='请输入 URL';return;}
  btn.disabled=true;btn.textContent='获取中…';ph(res,'正在获取…');st.textContent='';acts.style.display='none';_ips=[];
  fetch('/admin/getapi?url='+encodeURIComponent(url)+'&port='+port).then(function(r){return r.json()}).then(function(j){
    if(j.ok&&j.data.length){_ips=j.data;res.innerHTML='';_ips.forEach(function(ip){var d=document.createElement('div');d.className='ap-it';d.textContent=ip;res.appendChild(d);});st.className='ap-st ok';st.textContent='✓ 获取到 '+_ips.length+' 条';acts.style.display='flex';}
    else{ph(res,'无数据');st.className='ap-st er';st.textContent=j.msg||'返回为空';}
  }).catch(function(e){ph(res,'请求失败');st.className='ap-st er';st.textContent='✗ '+e.message;}).finally(function(){btn.disabled=false;btn.textContent='获取';});
};
V('apAdd').onclick=function(){
  if(!_ips.length)return;var ta=V('ipList');ta.value=(ta.value.trim()?ta.value.trim()+'\n':'')+_ips.join('\n');
  var b=V('apAdd');b.textContent='✓ 已追加';setTimeout(function(){b.textContent='追加结果';},2000);
};
V('apApi').onclick=function(){
  var url=val('apUrl'),port=V('apPort').value||'443';if(!url){alert('请先输入 API URL');return;}
  var b=V('apApi');b.disabled=true;b.textContent='保存中…';
  fetch('/admin/setapiurl',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:url,port:port})}).then(function(r){return r.json()}).then(function(j){
    if(j.ok){b.textContent='✓ 已保存';showSaved(url);}else b.textContent='保存失败';
    setTimeout(function(){b.disabled=false;b.textContent='追加API（实时）';},2000);
  }).catch(function(){b.textContent='保存失败';setTimeout(function(){b.disabled=false;b.textContent='追加API（实时）';},2000);});
};
function clearApi(){if(!confirm('确认清除已保存的实时API地址？'))return;fetch('/admin/clearapiurl',{method:'POST'}).then(function(){V('apSaved').style.display='none';V('apSaved').innerHTML='';});}

function fillSel(sel,data,cur){
  while(sel.options.length>1)sel.remove(1);
  function add(p,l,v){var o=document.createElement('option');o.value=v;o.textContent=l;p.appendChild(o);}
  (data||[]).forEach(function(it){if(it&&it.options){var g=document.createElement('optgroup');g.label=it.label;it.options.forEach(function(o){add(g,o.label,o.value);});sel.appendChild(g);}else if(it)add(sel,it.label,it.value);});
  var c=document.createElement('option');c.value='__c';c.textContent='自定义…';sel.appendChild(c);
  if(cur){sel.value=cur;if(sel.value!==cur)sel.value='__c';}else sel.value='';
}
function bindSel(selId,txtId){var s=V(selId),t=V(txtId),row=V(txtId+'row');s.onchange=function(){if(s.value==='__c'){row.style.display='';t.value='';t.focus();}else{t.value=s.value;row.style.display='none';}};}
bindSel('apiSel','apiTxt');bindSel('cfgSel','cfgTxt');
function loadSublist(){
  fetch('/admin/sublist').then(function(r){return r.json()}).then(function(j){
    fillSel(V('apiSel'),j.api,val('apiTxt'));fillSel(V('cfgSel'),j.config,val('cfgTxt'));
    V('apiTxtrow').style.display=V('apiSel').value==='__c'?'':'none';
    V('cfgTxtrow').style.display=V('cfgSel').value==='__c'?'':'none';
  }).catch(function(){});
}

Array.prototype.forEach.call(document.querySelectorAll('.sub-i'),function(b){
  b.onclick=function(){
    var url=location.origin+'/sub'+b.getAttribute('data-q');
    function ok(){b.classList.add('copied');setTimeout(function(){b.classList.remove('copied');},1600);}
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(url).then(ok).catch(function(){window.prompt('复制订阅链接：',url);});
    else window.prompt('复制订阅链接：',url);
  };
});
</script>
</body></html>
